name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pynacl>=1.5.0 fastapi>=0.100.0 uvicorn>=0.23.0 httpx>=0.25.0 pytest>=7.0

      - name: Lint - syntax check
        run: |
          python -m py_compile idit/chain.py
          python -m py_compile idit/keys.py
          python -m py_compile idit/server.py
          python -m py_compile idit/cli.py

      - name: Run tests
        run: pytest test_idit.py -v
